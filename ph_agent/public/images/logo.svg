<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:0.95" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" />

  <!-- Chat bubble (main) -->
  <rect x="32" y="48" width="120" height="80" rx="14" ry="14" fill="url(#bubbleGrad)" />
  <!-- Chat bubble tail -->
  <polygon points="52,128 38,148 72,128" fill="url(#bubbleGrad)" />

  <!-- AI circuit dots inside bubble -->
  <!-- Central brain node -->
  <circle cx="92" cy="88" r="10" fill="#10B981" />
  <!-- Orbiting nodes -->
  <circle cx="60" cy="72" r="6" fill="#059669" />
  <circle cx="124" cy="72" r="6" fill="#059669" />
  <circle cx="60" cy="104" r="6" fill="#059669" />
  <circle cx="124" cy="104" r="6" fill="#059669" />
  <!-- Connector lines -->
  <line x1="92" y1="88" x2="60" y2="72" stroke="#10B981" stroke-width="2" stroke-opacity="0.5" />
  <line x1="92" y1="88" x2="124" y2="72" stroke="#10B981" stroke-width="2" stroke-opacity="0.5" />
  <line x1="92" y1="88" x2="60" y2="104" stroke="#10B981" stroke-width="2" stroke-opacity="0.5" />
  <line x1="92" y1="88" x2="124" y2="104" stroke="#10B981" stroke-width="2" stroke-opacity="0.5" />

  <!-- Small secondary chat bubble (response indicator) -->
  <rect x="100" y="110" width="68" height="40" rx="10" ry="10" fill="#34D399" fill-opacity="0.9" />
  <!-- Tail on right side -->
  <polygon points="152,150 168,165 140,150" fill="#34D399" fill-opacity="0.9" />
  <!-- Dots inside secondary bubble -->
  <circle cx="118" cy="130" r="4" fill="#10B981" />
  <circle cx="134" cy="130" r="4" fill="#10B981" />
  <circle cx="150" cy="130" r="4" fill="#10B981" />
</svg>
